<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Game...</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --border: #1e1e2e;
            --accent: #7c6af7;
            --accent-glow: rgba(124, 106, 247, 0.25);
            --text-primary: #e8e6f0;
            --text-muted: #6b6880;
            --success: #4ade80;
            --error: #f87171;
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Courier New', 'Lucida Console', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(124, 106, 247, 0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 100%, rgba(124, 106, 247, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            padding: 48px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            max-width: 480px;
            width: 90%;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .icon {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .status-label {
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        #status-message {
            font-size: 14px;
            color: var(--text-primary);
            min-height: 20px;
            transition: color 0.3s ease;
        }

        #status-message.success {
            color: var(--success);
        }

        #status-message.error {
            color: var(--error);
        }

        .log {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 12px 16px;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.8;
            max-height: 120px;
            overflow-y: auto;
        }

        .log-entry {
            display: flex;
            gap: 10px;
        }

        .log-entry .ts {
            color: var(--accent);
            flex-shrink: 0;
            opacity: 0.6;
        }

        .log-entry.ok .msg { color: var(--success); }
        .log-entry.err .msg { color: var(--error); }
        .log-entry.info .msg { color: var(--text-muted); }

        .error-panel {
            display: none;
            width: 100%;
            background: rgba(248, 113, 113, 0.06);
            border: 1px solid rgba(248, 113, 113, 0.2);
            border-radius: 2px;
            padding: 16px;
            font-size: 12px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .error-panel strong {
            display: block;
            color: var(--error);
            margin-bottom: 8px;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .error-panel.visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <div class="spinner" id="spinner"></div>
        </div>

        <div class="status-block">
            <div class="status-label">Initializing Security Context</div>
            <div id="status-message">Checking service worker support...</div>
        </div>

        <div class="log" id="log"></div>

        <div class="error-panel" id="error-panel">
            <strong>Cannot Launch</strong>
            <span id="error-detail"></span>
        </div>
    </div>

    <script>
        var GAME_FILE = "game.html";

        var statusEl = document.getElementById("status-message");
        var logEl = document.getElementById("log");
        var errorPanel = document.getElementById("error-panel");
        var errorDetail = document.getElementById("error-detail");
        var spinner = document.getElementById("spinner");

        function addLog(msg, type) {
            type = type || "info";
            var now = new Date();
            var ts = now.toTimeString().slice(0, 8);
            var entry = document.createElement("div");
            entry.className = "log-entry " + type;
            entry.innerHTML = '<span class="ts">' + ts + '</span><span class="msg">' + msg + '</span>';
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = type || "";
        }

        function showError(msg) {
            spinner.style.borderColor = "var(--border)";
            spinner.style.borderTopColor = "var(--error)";
            spinner.style.animationDuration = "3s";
            setStatus("Launch failed", "error");
            errorDetail.textContent = msg;
            errorPanel.classList.add("visible");
        }

        function launch() {
            setStatus("Redirecting to game...", "success");
            addLog("Headers confirmed active — launching", "ok");
            setTimeout(function () {
                window.location.replace(GAME_FILE);
            }, 600);
        }

        function registerAndLaunch() {
            if (!("serviceWorker" in navigator)) {
                addLog("Service Worker API not available", "err");
                showError("This browser does not support Service Workers. Open the game in Chrome or a Chromium-based browser.");
                return;
            }

            addLog("Service Worker API detected", "ok");
            setStatus("Registering service worker...");

            navigator.serviceWorker.register("coi-serviceworker.js").then(function (reg) {
                addLog("Registration successful (scope: " + reg.scope + ")", "ok");

                if (navigator.serviceWorker.controller) {
                    addLog("Worker already active and controlling page", "ok");
                    setStatus("Worker active", "success");
                    launch();
                    return;
                }

                addLog("Waiting for worker to activate and take control...", "info");
                setStatus("Activating worker...");

                navigator.serviceWorker.addEventListener("controllerchange", function () {
                    addLog("Controller acquired — reloading with headers", "ok");
                    setStatus("Reloading with COOP/COEP headers...", "success");
                    window.location.reload();
                });

                var sw = reg.installing || reg.waiting;
                if (sw) {
                    sw.addEventListener("statechange", function () {
                        addLog("Worker state: " + sw.state, "info");
                    });
                }

            }).catch(function (err) {
                addLog("Registration failed: " + err.message, "err");
                showError("Service Worker registration failed: " + err.message + ". Ensure the server is running and both files are in the same directory.");
            });
        }

        if (sessionStorage.getItem("sw_reload") === "1") {
            sessionStorage.removeItem("sw_reload");
            addLog("Post-reload check", "info");

            if (typeof SharedArrayBuffer !== "undefined") {
                addLog("SharedArrayBuffer is accessible", "ok");
                launch();
            } else {
                addLog("SharedArrayBuffer still blocked after reload", "err");
                showError("The headers were injected but SharedArrayBuffer is still blocked. Try opening this page in Chrome (not Samsung Browser or Firefox).");
            }
        } else {
            sessionStorage.setItem("sw_reload", "1");
            registerAndLaunch();
        }
    </script>
</body>
</html>
