name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Web.zip from latest release
        run: |
          REPO="${{ github.repository }}"
          ASSET_URL=$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['url'] for a in assets if a['name']=='Web.zip'))")
          curl -L -o Web.zip \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL"

      - name: Extract Web.zip
        run: |
          unzip Web.zip -d site
          find site -mindepth 2 -type f -exec mv -t site {} +
          find site -type d -empty -delete

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp -r site/* .
          rm -rf site Web.zip
          git add -A
          git commit -m "Deploy web build"
          git push
