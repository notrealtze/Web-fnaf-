name: Deploy to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Web.zip from latest release
        run: |
          REPO="${{ github.repository }}"
          ASSET_URL=$(curl -s "https://api.github.com/repos/${REPO}/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | python3 -c "import sys,json; assets=json.load(sys.stdin)['assets']; print(next(a['url'] for a in assets if a['name']=='Web.zip'))")
          curl -L -o Web.zip \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "$ASSET_URL"

      - name: Extract and flatten Web.zip
        run: |
          unzip Web.zip -d extracted
          mkdir -p site
          find extracted -type f | xargs -I{} mv {} site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
